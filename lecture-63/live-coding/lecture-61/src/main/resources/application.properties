spring.application.name=spring-boot-intro
server.port=9000

# MongoDB
spring.mongodb.uri=mongodb://localhost:27017/event_management
spring.data.mongodb.auto-index-creation=true

#logging.level.root=DEBUG

# Kafka broker?
spring.kafka.bootstrap=localhost:9002

# Consumer group - individual consumers can override this config
spring.kafka.consumer.group-id=event-registration

# Serialize Kafka message key
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer

# Serialize Kafka message value
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Deserialize Kafka message key
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Deserialize Kafka message value
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer


spring.kafka.consumer.properties.spring.json.trusted.packages=com.guvi.kafka
spring.kafka.consumer.properties.spring.json.value.default-type=com.guvi.kafka.BookingEvent
#properties.spring.json.type